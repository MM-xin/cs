<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ form_title }} - CS 饰品管理工具</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <h1>CS 饰品管理工具</h1>
        <p class="subtext">当前用户：{{ username }}</p>
        <nav class="nav-links">
          <a href="/items">饰品库存</a>
          <a href="/items/new">新增饰品</a>
          <a href="/dashboard">主页</a>
        </nav>
      </aside>

      <main class="content">
        <section class="content-card form-card">
          <div class="page-header">
            <div>
              <h2>{{ form_title }}</h2>
              <p class="subtext">买入时间可手动修改，冷却结束时间和可售状态会自动重新计算。</p>
            </div>
            <a class="text-link" href="/items">返回列表</a>
          </div>

          <form method="post" action="{{ form_action }}" class="form-grid">
            <div>
              <label for="name">名称</label>
              <input id="name" name="name" value="{{ item.name }}" required />
            </div>

            <div>
              <label for="category">类型</label>
              <select id="category" name="category" required>
                {% for option in category_options %}
                <option value="{{ option }}" {% if item.category == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
              </select>
            </div>

            <div>
              <label for="wear">磨损档位</label>
              <select id="wear" name="wear" required>
                {% for option in wear_options %}
                <option value="{{ option }}" {% if item.wear == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
              </select>
            </div>

            <div>
              <label for="steamdt_id">SteamDT ID</label>
              <input id="steamdt_id" name="steamdt_id" value="{{ item.steamdt_id }}" />
            </div>

            <div class="full-width">
              <label for="image_url">图片 URL</label>
              <input id="image_url" name="image_url" value="{{ item.image_url }}" placeholder="留空时使用默认占位图" />
            </div>

            <div>
              <label for="buy_price">买入价</label>
              <input id="buy_price" name="buy_price" type="number" step="0.01" min="0" value="{{ item.buy_price }}" required />
            </div>

            <div>
              <label for="current_price">当前价</label>
              <input id="current_price" name="current_price" type="number" step="0.01" min="0" value="{{ item.current_price }}" placeholder="留空则默认为买入价" />
            </div>

            <div>
              <label for="sell_price">卖出价</label>
              <input id="sell_price" name="sell_price" type="number" step="0.01" min="0" value="{{ item.sell_price }}" />
            </div>

            <div>
              <label for="fee_rate">手续费率</label>
              <input id="fee_rate" name="fee_rate" type="number" step="0.0001" min="0" value="{{ item.fee_rate }}" />
            </div>

            <div>
              <label for="fee_amount">手续费金额</label>
              <input id="fee_amount" name="fee_amount" type="number" step="0.01" min="0" value="{{ item.fee_amount }}" />
            </div>

            <div>
              <label for="buy_platform">买入平台</label>
              <input id="buy_platform" name="buy_platform" value="{{ item.buy_platform }}" />
            </div>

            <div>
              <label for="buy_time">购买时间</label>
              <input id="buy_time" name="buy_time" type="datetime-local" value="{{ item.buy_time }}" required />
            </div>

            <div>
              <label for="status">状态</label>
              <select id="status" name="status">
                {% for value, label in status_options %}
                <option value="{{ value }}" {% if item.status == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="meta-panel">
              <p><strong>创建时间：</strong>{{ created_at_text }}</p>
              <p><strong>冷却结束：</strong>{{ tradable_at_text }}</p>
              <p><strong>当前是否可售：</strong>{{ is_tradable_text }}</p>
            </div>

            <div class="full-width">
              <label for="note">备注</label>
              <textarea id="note" name="note" rows="4">{{ item.note }}</textarea>
            </div>

            <div class="full-width form-actions">
              <button type="submit">{{ submit_label }}</button>
              <a class="text-link" href="/items">取消</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
